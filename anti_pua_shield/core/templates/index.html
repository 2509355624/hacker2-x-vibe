<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反PUA护盾 - 聊天模式</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; }
        .zcool { font-family: 'ZCOOL KuaiLe', cursive; }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
        }

        .scene-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 14px 16px;
            transition: all 0.3s;
            cursor: pointer;
            color: white;
        }

        .scene-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .scene-btn.selected {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            border-color: #667eea;
        }

        .result-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }

        .result-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid;
            margin-bottom: 12px;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .generate-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 14px;
            padding: 16px;
            width: 100%;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        textarea {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: white;
            width: 100%;
            resize: vertical;
            font-size: 1rem;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        textarea:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff3b5c;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(255, 59, 92, 0.4);
            z-index: 1000;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body class="text-white">
    <div class="max-w-3xl mx-auto px-4 py-6">
        <header class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <a href="/" class="p-2 rounded-lg bg-white/10 hover:bg-white/20 transition">
                    <span class="text-xl">🏠</span>
                </a>
                <div>
                    <h1 class="text-xl font-bold">反PUA护盾</h1>
                    <p class="text-gray-400 text-xs">聊天模式</p>
                </div>
            </div>
        </header>

        <div class="glass-card rounded-3xl p-6 mb-6">
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-300 mb-3">选择场景</label>
                <div class="grid grid-cols-2 gap-3" id="scene-group">
                    <button class="scene-btn text-center" data-scene="职场PUA">💼 职场PUA</button>
                    <button class="scene-btn text-center" data-scene="亲戚催婚">👨‍👩‍👧 亲戚催婚</button>
                    <button class="scene-btn text-center" data-scene="甲方刁难">💰 甲方刁难</button>
                    <button class="scene-btn text-center" data-scene="朋友攀比">🪑 朋友攀比</button>
                </div>
                <input type="hidden" id="selected_scene" name="scene">
            </div>

            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-300 mb-3">对方的刁难/PUA话术</label>
                <textarea id="user_input" rows="3" placeholder="请输入对方说的话，比如：你都这么大了怎么还不结婚？"></textarea>
            </div>

            <button id="generate_btn" class="generate-btn">
                <span id="btn_text">⚡ 一键生成护盾</span>
                <span id="loading_text" class="hidden">🤖 AI生成中...</span>
            </button>
        </div>

        <div id="result_card" class="hidden">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <span>🛡️</span> 你的反PUA护盾
            </h2>

            <div class="mb-4">
                <h3 class="text-sm font-medium text-gray-400 mb-3">💬 分情商回怼语录</h3>
                <div class="space-y-3">
                    <div class="result-item" style="border-color: #ff3b5c;">
                        <div class="flex justify-between items-start mb-2">
                            <p class="font-bold text-red-400 text-sm">🔥 低情商（爽怼天花板）</p>
                        </div>
                        <div id="low_eq" class="text-gray-200 whitespace-pre-line text-sm"></div>
                        <button class="copy-btn mt-2" data-target="low_eq">📋 复制</button>
                    </div>
                    <div class="result-item" style="border-color: #9ca3af;">
                        <p class="font-bold text-gray-400 text-sm">💭 中情商</p>
                        <div id="mid_eq" class="text-gray-200 whitespace-pre-line text-sm mt-2"></div>
                        <button class="copy-btn mt-2" data-target="mid_eq">📋 复制</button>
                    </div>
                    <div class="result-item" style="border-color: #00d26a;">
                        <p class="font-bold text-green-400 text-sm">✨ 高情商</p>
                        <div id="high_eq" class="text-gray-200 whitespace-pre-line text-sm mt-2"></div>
                        <button class="copy-btn mt-2" data-target="high_eq">📋 复制</button>
                    </div>
                    <div class="result-item" style="border-color: #9b59b6;">
                        <p class="font-bold text-purple-400 text-sm">🌀 超高情商（摆烂终结）</p>
                        <div id="super_eq" class="text-gray-200 whitespace-pre-line text-sm mt-2"></div>
                        <button class="copy-btn mt-2" data-target="super_eq">📋 复制</button>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <h3 class="text-sm font-medium text-gray-400 mb-3">💪 心态建设解药</h3>
                <div class="result-item" style="border-color: #667eea;">
                    <div id="mind_content" class="text-gray-200 whitespace-pre-line text-sm"></div>
                    <button class="copy-btn mt-2" data-target="mind_content">📋 复制</button>
                </div>
            </div>

            <div>
                <h3 class="text-sm font-medium text-gray-400 mb-3">🚧 边界拒绝话术</h3>
                <div class="result-item" style="border-color: #f5576c;">
                    <div id="refuse_content" class="text-gray-200 whitespace-pre-line text-sm"></div>
                    <button class="copy-btn mt-2" data-target="refuse_content">📋 复制</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedScene = '';

        document.querySelectorAll('.scene-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedScene = btn.dataset.scene;
                document.getElementById('selected_scene').value = selectedScene;
            });
        });

        document.getElementById('generate_btn').addEventListener('click', async () => {
            const userInput = document.getElementById('user_input').value.trim();
            const btn = document.getElementById('generate_btn');
            const btnText = document.getElementById('btn_text');
            const loadingText = document.getElementById('loading_text');

            if (!selectedScene) {
                showToast('请先选择对应的场景');
                return;
            }
            if (!userInput) {
                showToast('请输入对方的刁难话术');
                return;
            }

            btn.disabled = true;
            btnText.classList.add('hidden');
            loadingText.classList.remove('hidden');

            try {
                const response = await fetch('/api/generate/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        scene: selectedScene,
                        user_input: userInput
                    })
                });

                const result = await response.json();

                if (result.code === 200) {
                    const backtalk = result.data.backtalk;
                    document.getElementById('low_eq').textContent = backtalk.低情商.join('\n');
                    document.getElementById('mid_eq').textContent = backtalk.中情商.join('\n');
                    document.getElementById('high_eq').textContent = backtalk.高情商.join('\n');
                    document.getElementById('super_eq').textContent = backtalk.超高情商.join('\n');
                    document.getElementById('mind_content').textContent = result.data.mind_help.join('\n');
                    document.getElementById('refuse_content').textContent = result.data.refuse_words.join('\n');
                    document.getElementById('result_card').classList.remove('hidden');
                    document.getElementById('result_card').scrollIntoView({ behavior: 'smooth' });
                } else {
                    showToast(result.msg);
                }
            } catch (e) {
                showToast('网络异常，请稍后重试');
                console.error(e);
            } finally {
                btn.disabled = false;
                btnText.classList.remove('hidden');
                loadingText.classList.add('hidden');
            }
        });

        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const targetId = btn.dataset.target;
                const content = document.getElementById(targetId).textContent;
                navigator.clipboard.writeText(content).then(() => {
                    const originalText = btn.textContent;
                    btn.textContent = '✅ 已复制!';
                    setTimeout(() => {
                        btn.textContent = originalText;
                    }, 2000);
                });
            });
        });

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
